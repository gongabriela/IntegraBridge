<div class="dashboard-layout">
  
    @if (isSidebarOpen) {
    <div class="sidebar-backdrop" (click)="toggleSidebar()"></div>
  }

  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="logo-container">
      <h2>IntegraBridge</h2>
    </div>
    
    <div class="sidebar-profile">
      <div class="avatar">G</div>
      <div class="profile-info">
        <span class="profile-name">Gabriela</span>
        <span class="profile-email">admin&#64;integrabridge.pt</span>
      </div>
    </div>

    <nav class="nav-menu">
      <a class="nav-item active">Dashboard</a>
      <a class="nav-item">Meus Pedidos</a>
      <a class="nav-item">Configurações</a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="sair()">Sair da Conta</button>
    </div>
  </aside>

  <main class="main-content">
    
    <header class="top-header">
      <div class="header-top-row">
        <button class="menu-toggle-btn" (click)="toggleSidebar()">
          ☰
        </button>
        <h1>Overview de Pedidos</h1>
      </div>
      <p>Acompanhe e gira os pedidos de ajuda da comunidade em tempo real.</p>
    </header>

    <section class="dashboard-body">
      
      </section>
  </main>

</div>
