<div class="auth-container">
    <div class="card auth-card">
        <div class="auth-header">
            <h2>IntegraBridge</h2>
            <h3>{{ isLoginMode ? 'Bem vindo de volta' : 'Junte-se a nós' }}</h3>
            <p>{{ isLoginMode ? 'Aceda à sua conta para continuar' : 'Crie a sua conta para ajudar ou pedir ajuda' }}</p>
        </div>
        
        <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="auth-form-container">
            @if (!isLoginMode) {
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" formControlName="nome" placeholder="O teu nome" class="input-field">
                </div>
            }
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" formControlName="email" placeholder="Digite seu email" class="input-field" />
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" formControlName="password" placeholder="Digite sua senha" class="input-field" />
            </div>
            
            <button type="submit" class="button-primary full-width" [disabled]="authForm.invalid">
                {{ isLoginMode ? 'Entrar' : 'Criar Conta' }}
            </button>
        </form>

        <div class="auth-footer">
            <p>
                {{ isLoginMode ? 'Não tem uma conta?' : 'Já tem uma conta?' }}
                <button class="link-button" (click)="toggleMode()">
                    {{ isLoginMode ? 'Registe-se' : 'Faça login' }}
                </button>
            </p>
        </div>
    </div>
</div>
