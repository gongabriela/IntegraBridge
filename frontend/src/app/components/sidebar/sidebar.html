@if (isOpen) {
  <div class="sidebar-backdrop" (click)="close.emit()"></div>
}

<aside class="sidebar" [class.open]="isOpen">
  <div class="logo-container">
    <h2>IntegraBridge</h2>
  </div>

  <div class="sidebar-profile">
    <div class="avatar">{{ inicialAvatar }}</div>
    <div class="profile-info">
      <span class="profile-name">{{ nomeUtilizador }}</span>
      <span class="profile-email">{{ emailUtilizador }}</span>
    </div>
  </div>

  <nav class="nav-menu">
    <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a class="nav-item" routerLink="/meus-pedidos" routerLinkActive="active">Meus Pedidos</a>
    <a class="nav-item" routerLink="/minhas-contribuicoes" routerLinkActive="active">Minhas Contribuições</a>
  </nav>

  <div class="theme-toggle-section">
    <button class="theme-toggle-btn" 
            (click)="toggleTheme()" 
            [class.dark-active]="(currentTheme$ | async) === 'dark'"
            title="Alternar tema claro/escuro">
      <span class="theme-icon sun-icon">☀️</span>
      <span class="theme-icon moon-icon">🌙</span>
    </button>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logoutAction.emit()">Sair da Conta</button>
  </div>
</aside>
