<div class="request-card">
  <div class="card-header">
    <span class="status-badge" [class]="dados.status">
      {{ dados.status | titlecase }}
    </span>
    <span class="request-id">REQ-{{ dados.id.padStart(4, '0') }}</span>
  </div>

  <h4 class="card-title">{{ dados.titulo }}</h4>
  
  <div class="tags-row">
    <span class="tag">English</span> <span class="tag">{{ dados.categoria }}</span>
  </div>

  <p class="card-desc">{{ dados.descricao }}</p>

  <button class="view-btn">View Details</button>
</div>
